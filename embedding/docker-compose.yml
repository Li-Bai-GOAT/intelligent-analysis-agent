services:
  ollama:
    container_name: dataagent-ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "9997:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  ollama:
