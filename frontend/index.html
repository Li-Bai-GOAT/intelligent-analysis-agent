<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Agent</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Excel 解析 - SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <!-- 代码高亮 - Prism.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.css">
</head>
<body>
    <!-- 登录/注册页面 -->
    <div id="auth-page" class="page">
        <div class="auth-container">
            <h1>Data Agent</h1>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>
            <form id="login-form" class="auth-form">
                <input type="text" id="login-username" placeholder="用户名" required>
                <input type="password" id="login-password" placeholder="密码" required>
                <button type="submit">登录</button>
                <p class="error-msg" id="login-error"></p>
            </form>
            <form id="register-form" class="auth-form hidden">
                <input type="text" id="register-username" placeholder="用户名" required>
                <input type="password" id="register-password" placeholder="密码" required>
                <input type="password" id="register-confirm" placeholder="确认密码" required>
                <button type="submit">注册</button>
                <p class="error-msg" id="register-error"></p>
            </form>
        </div>
    </div>

    <!-- 主应用页面 -->
    <div id="app-page" class="page hidden">
        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="logo">Data Agent</div>
            <div class="user-menu">
                <button id="user-btn" class="user-btn">
                    <span id="username-display"></span>
                    <span class="arrow">▼</span>
                </button>
                <div id="user-dropdown" class="dropdown hidden">
                    <button id="admin-btn">管理后台</button>
                    <button id="logout-btn">退出登录</button>
                </div>
            </div>
        </header>

        <div class="main-container">
            <!-- 左侧边栏 - 历史对话 -->
            <aside class="sidebar-left">
                <div class="section-header">
                    <button id="toggle-sidebar-btn" class="icon-btn toggle-btn" title="收缩/展开">☰</button>
                    <h3>历史对话</h3>
                    <button id="new-chat-btn" class="icon-btn" title="新建对话">+</button>
                </div>
                <div id="sessions-list" class="list"></div>
            </aside>

            <!-- 主聊天区域 -->
            <main class="chat-area">
                <div id="messages" class="messages"></div>
                <div class="input-area">
                    <div id="file-preview" class="file-preview hidden"></div>
                    <div class="input-row">
                        <label class="file-upload-btn" title="上传文件">
                            📎
                            <input type="file" id="file-input" multiple hidden>
                        </label>
                        <textarea id="message-input" placeholder="输入消息..." rows="1"></textarea>
                        <div id="context-ring" class="context-ring" title="上下文使用量">
                            <svg viewBox="0 0 36 36">
                                <circle class="ring-bg" cx="18" cy="18" r="15.9"/>
                                <circle class="ring-progress" cx="18" cy="18" r="15.9" stroke-dasharray="0 100"/>
                            </svg>
                            <span class="ring-text">0%</span>
                        </div>
                        <button id="send-btn" title="发送">➤</button>
                    </div>
                </div>
            </main>

            <!-- 右侧边栏 - 标签页 -->
            <aside class="sidebar-right">
                <div class="tabs">
                    <button class="tab-btn" data-tab="plan">计划</button>
                    <button class="tab-btn active" data-tab="files">文件</button>
                    <button class="tab-btn" data-tab="tools">终端</button>
                </div>
                <div id="tab-plan" class="tab-content">
                    <div class="plan-container">
                        <div id="plan-display" class="plan-display">
                            <div class="empty-state">暂无计划</div>
                        </div>
                    </div>
                </div>
                <div id="tab-files" class="tab-content active">
                    <div class="files-header">
                        <div id="files-breadcrumb" class="breadcrumb">
                            <span class="crumb active" data-path="">workspace</span>
                        </div>
                        <div class="files-actions">
                            <button id="download-zip-btn" class="icon-btn" title="下载全部(ZIP)">↓</button>
                            <button id="refresh-files-btn" class="icon-btn" title="刷新">↻</button>
                        </div>
                    </div>
                    <div id="sandbox-files-container">
                        <div id="sandbox-files" class="list"></div>
                    </div>
                    <div id="file-content-view" class="file-content-view hidden">
                        <div class="file-content-header">
                            <span id="file-content-name"></span>
                            <button id="file-content-download" class="icon-btn" title="下载">↓</button>
                        </div>
                        <div id="file-content-body" class="code-preview"></div>
                    </div>
                </div>
                <div id="tab-tools" class="tab-content">
                    <div class="terminal">
                        <div class="terminal-header">
                            <div class="dots">
                                <span class="dot red"></span>
                                <span class="dot yellow"></span>
                                <span class="dot green"></span>
                            </div>
                            <span class="title">agent_sandbox</span>
                        </div>
                        <div id="terminal-body" class="terminal-body"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 管理后台页面 -->
    <div id="admin-page" class="page hidden">
        <header class="top-bar">
            <div class="logo">Data Agent</div>
            <div class="admin-nav">
                <button id="back-to-app-btn" class="back-btn">← 返回应用</button>
            </div>
        </header>
        <div class="admin-container">
            <!-- 管理后台标签页 -->
            <div class="admin-tabs">
                <button class="admin-tab-btn active" data-tab="knowledge">
                    <span class="tab-icon">📚</span>
                    <span>知识库管理</span>
                </button>
                <button class="admin-tab-btn" data-tab="prompt">
                    <span class="tab-icon">📝</span>
                    <span>产品经理提示词</span>
                </button>
                <button class="admin-tab-btn" data-tab="sandbox">
                    <span class="tab-icon">🧊</span>
                    <span>Agent沙箱管理</span>
                </button>
            </div>
            <!-- 知识库管理内容 -->
            <div id="admin-tab-knowledge" class="admin-tab-content active">
                <div class="admin-panel">
                    <div class="panel-header">
                        <h2>知识库列表</h2>
                        <div class="panel-actions">
                            <input type="text" id="knowledge-search" class="search-input" placeholder="搜索标题/内容...">
                            <button id="knowledge-search-btn" class="btn-secondary">🔍 搜索</button>
                            <select id="category-filter" class="category-select">
                                <option value="">全部类别</option>
                            </select>
                            <button id="add-knowledge-btn" class="btn-primary">+ 添加知识</button>
                        </div>
                    </div>
                    <div id="knowledge-list" class="knowledge-table-container"></div>
                </div>
            </div>
            <!-- 产品经理提示词管理 -->
            <div id="admin-tab-prompt" class="admin-tab-content">
                <div class="admin-panel prompt-editor-panel">
                    <div class="panel-header">
                        <h2>产品经理提示词管理</h2>
                        <div class="panel-actions">
                            <span id="prompt-save-status" class="save-status"></span>
                        </div>
                    </div>
                    <div class="prompt-editor-container">
                        <div class="prompt-editor-left">
                            <div class="editor-label">编辑 (Markdown)</div>
                            <textarea id="system-prompt-editor" placeholder="输入系统提示词..."></textarea>
                        </div>
                        <div class="prompt-editor-right">
                            <div class="editor-label">实时预览</div>
                            <div id="system-prompt-preview" class="markdown-preview"></div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Agent沙箱管理 -->
            <div id="admin-tab-sandbox" class="admin-tab-content">
                <div class="sandbox-management">
                    <!-- 左侧子导航 -->
                    <div class="sandbox-sidebar">
                        <button class="sandbox-nav-btn active" data-subtab="agents">
                            <span>🤖</span> Agent管理
                        </button>
                        <button class="sandbox-nav-btn" data-subtab="skills">
                            <span>🛠️</span> Skill管理
                        </button>
                        <button class="sandbox-nav-btn" data-subtab="mcps">
                            <span>🔌</span> MCP管理
                        </button>
                    </div>
                    <!-- 右侧内容区 -->
                    <div class="sandbox-content">
                        <!-- Agent管理 -->
                        <div id="sandbox-subtab-agents" class="sandbox-subtab-content active">
                            <div class="panel-header">
                                <h2>Agent 管理</h2>
                                <div class="panel-actions">
                                    <button id="add-agent-btn" class="btn-primary">+ 添加 Agent</button>
                                </div>
                            </div>
                            <div id="agent-list" class="config-list"></div>
                        </div>
                        <!-- Skill管理 -->
                        <div id="sandbox-subtab-skills" class="sandbox-subtab-content">
                            <div class="panel-header">
                                <h2>Skill 管理</h2>
                                <div class="panel-actions">
                                    <button id="add-skill-btn" class="btn-primary">📦 上传 Skill</button>
                                </div>
                            </div>
                            <div id="skill-list" class="config-list"></div>
                        </div>
                        <!-- MCP管理 -->
                        <div id="sandbox-subtab-mcps" class="sandbox-subtab-content">
                            <div class="panel-header">
                                <h2>MCP 管理</h2>
                                <div class="panel-actions">
                                    <button id="add-mcp-btn" class="btn-primary">+ 添加 MCP</button>
                                </div>
                            </div>
                            <div id="mcp-list" class="config-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Agent编辑弹窗 -->
    <div id="agent-edit-modal" class="modal-overlay hidden">
        <div class="modal-box modal-large">
            <div class="modal-header">
                <h2 id="agent-edit-title">添加 Agent</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="agent-form">
                    <input type="hidden" id="agent-id">
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>名称 <span class="required">*</span></label>
                            <input type="text" id="agent-name" required pattern="^[a-z0-9-]+$" placeholder="小写字母、数字、连字符">
                        </div>
                        <div class="form-group flex-1">
                            <label>模式</label>
                            <select id="agent-mode">
                                <option value="all">all (全部)</option>
                                <option value="primary">primary (主代理)</option>
                                <option value="subagent">subagent (子代理)</option>
                            </select>
                        </div>
                        <div class="form-group flex-1">
                            <label>启用</label>
                            <label class="switch">
                                <input type="checkbox" id="agent-enabled" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>描述 <span class="required">*</span></label>
                        <textarea id="agent-description" rows="2" required placeholder="描述 Agent 的功能和使用场景"></textarea>
                    </div>
                    <div class="form-group">
                        <label>工具开关 <span class="hint">(启用/禁用工具)</span></label>
                        <div class="checkbox-group" id="agent-tools">
                            <label><input type="checkbox" name="tool" value="read" checked> read</label>
                            <label><input type="checkbox" name="tool" value="write" checked> write</label>
                            <label><input type="checkbox" name="tool" value="edit" checked> edit</label>
                            <label><input type="checkbox" name="tool" value="bash" checked> bash</label>
                            <label><input type="checkbox" name="tool" value="glob" checked> glob</label>
                            <label><input type="checkbox" name="tool" value="grep" checked> grep</label>
                            <label><input type="checkbox" name="tool" value="list" checked> list</label>
                            <label><input type="checkbox" name="tool" value="patch" checked> patch</label>
                            <label><input type="checkbox" name="tool" value="skill" checked> skill</label>
                            <label><input type="checkbox" name="tool" value="todoread" checked> todoread</label>
                            <label><input type="checkbox" name="tool" value="todowrite" checked> todowrite</label>
                            <label><input type="checkbox" name="tool" value="webfetch" checked> webfetch</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>操作权限 <span class="hint">(allow=自动执行, ask=需确认, deny=禁止)</span></label>
                        <div class="permission-selects">
                            <div class="perm-item">
                                <span>edit:</span>
                                <select id="agent-perm-edit">
                                    <option value="allow">allow</option>
                                    <option value="ask">ask</option>
                                    <option value="deny">deny</option>
                                </select>
                            </div>
                            <div class="perm-item">
                                <span>bash:</span>
                                <select id="agent-perm-bash">
                                    <option value="allow">allow</option>
                                    <option value="ask">ask</option>
                                    <option value="deny">deny</option>
                                </select>
                            </div>
                            <div class="perm-item">
                                <span>webfetch:</span>
                                <select id="agent-perm-webfetch">
                                    <option value="allow">allow</option>
                                    <option value="ask">ask</option>
                                    <option value="deny">deny</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>Temperature</label>
                            <input type="number" id="agent-temperature" min="0" max="1" step="0.1" placeholder="0.0 - 1.0">
                        </div>
                        <div class="form-group flex-1">
                            <label>最大步数</label>
                            <input type="number" id="agent-max-steps" min="1" placeholder="留空不限制">
                        </div>
                        <div class="form-group flex-1">
                            <label>隐藏 (仅subagent)</label>
                            <label class="switch">
                                <input type="checkbox" id="agent-hidden">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Agent 正文 (Markdown)</label>
                        <div class="md-editor-container">
                            <div class="md-editor-pane">
                                <textarea id="agent-content" placeholder="Agent 的详细指令和说明..."></textarea>
                            </div>
                            <div class="md-preview-pane">
                                <div id="agent-content-preview" class="md-preview"></div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="agent-cancel-btn">取消</button>
                <button type="button" class="btn-primary" id="agent-save-btn">保存</button>
            </div>
        </div>
    </div>

    <!-- Skill上传弹窗 -->
    <div id="skill-upload-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h2>上传 Skill</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="upload-zone" id="skill-upload-zone">
                    <div class="upload-icon">📦</div>
                    <p>点击或拖拽上传 Skill 压缩包</p>
                    <p class="upload-hint">支持 .zip 格式，需包含 SKILL.md</p>
                    <input type="file" id="skill-file-input" accept=".zip" hidden>
                </div>
                <div id="skill-upload-status" class="upload-status hidden"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="skill-upload-cancel">取消</button>
            </div>
        </div>
    </div>

    <!-- Skill权限弹窗 -->
    <div id="skill-perm-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="skill-perm-title">Skill 权限配置</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="skill-perm-id">
                <div class="skill-info-display">
                    <p><strong>名称:</strong> <span id="skill-perm-name"></span></p>
                    <p><strong>描述:</strong> <span id="skill-perm-desc"></span></p>
                </div>
                <div class="form-group">
                    <label>Agent 权限配置</label>
                    <div id="skill-agent-permissions" class="agent-permission-list"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="skill-perm-cancel">取消</button>
                <button type="button" class="btn-primary" id="skill-perm-save">保存</button>
            </div>
        </div>
    </div>

    <!-- Skill详情弹窗 -->
    <div id="skill-detail-modal" class="modal-overlay hidden">
        <div class="modal-box modal-large">
            <div class="modal-header">
                <h2 id="skill-detail-title">Skill 详情</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body skill-detail-body">
                <div class="skill-file-tree" id="skill-file-tree"></div>
                <div class="skill-file-content">
                    <div class="skill-file-tabs" id="skill-file-tabs"></div>
                    <div class="skill-file-viewer" id="skill-file-viewer">
                        <div class="skill-file-placeholder">选择文件查看内容</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="skill-detail-close">关闭</button>
            </div>
        </div>
    </div>

    <!-- MCP编辑弹窗 -->
    <div id="mcp-edit-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="mcp-edit-title">添加 MCP</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="mcp-form">
                    <input type="hidden" id="mcp-id">
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>名称 <span class="required">*</span></label>
                            <input type="text" id="mcp-name" required placeholder="MCP 名称">
                        </div>
                        <div class="form-group flex-1">
                            <label>类型 <span class="required">*</span></label>
                            <select id="mcp-type" required>
                                <option value="remote">remote (远程)</option>
                                <option value="local">local (本地)</option>
                            </select>
                        </div>
                        <div class="form-group flex-1">
                            <label>启用</label>
                            <label class="switch">
                                <input type="checkbox" id="mcp-enabled" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group" id="mcp-url-group">
                        <label>URL <span class="required">*</span></label>
                        <input type="url" id="mcp-url" placeholder="http://example.com/mcp">
                    </div>
                    <div class="form-group hidden" id="mcp-command-group">
                        <label>命令</label>
                        <input type="text" id="mcp-command" placeholder="命令（JSON数组格式）">
                    </div>
                    <div class="form-group">
                        <label>Headers (JSON)</label>
                        <textarea id="mcp-headers" rows="2" placeholder='{"Authorization": "Bearer xxx"}'></textarea>
                    </div>
                    <div class="form-group">
                        <label>Environment (JSON)</label>
                        <textarea id="mcp-environment" rows="2" placeholder='{"API_KEY": "xxx"}'></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="mcp-cancel-btn">取消</button>
                <button type="button" class="btn-primary" id="mcp-save-btn">保存</button>
            </div>
        </div>
    </div>

    <!-- 知识编辑弹窗 -->
    <div id="knowledge-edit-modal" class="knowledge-modal-overlay hidden">
        <div class="knowledge-modal-box">
            <div class="modal-header">
                <h2 id="knowledge-edit-title">添加知识</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="knowledge-form">
                    <input type="hidden" id="knowledge-id">
                    <div class="form-row">
                        <div class="form-group flex-2">
                            <label>标题</label>
                            <input type="text" id="knowledge-title" required>
                        </div>
                        <div class="form-group flex-1">
                            <label>类别</label>
                            <select id="knowledge-category" required>
                                <option value="">请选择类别</option>
                                <option value="计算公式">计算公式</option>
                                <option value="概念定义">概念定义</option>
                                <option value="分析方法">分析方法</option>
                                <option value="分析流程">分析流程</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group content-editor">
                        <label>内容 <span class="hint">(支持 Markdown 语法)</span></label>
                        <div class="editor-tabs">
                            <button type="button" class="editor-tab active" data-tab="edit">编辑</button>
                            <button type="button" class="editor-tab" data-tab="preview">预览</button>
                        </div>
                        <div class="editor-content">
                            <textarea id="knowledge-content" rows="12" required></textarea>
                            <div id="knowledge-preview" class="markdown-preview hidden"></div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancel-knowledge-btn">取消</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
